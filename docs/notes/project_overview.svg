<svg width="1400" height="920" viewBox="0 0 1400 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">redox_constantV project overview</title>
  <desc id="desc">Overview diagram of repository layout, main workflows, and common commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f1e8"/>
      <stop offset="100%" stop-color="#e9f0e8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <style>
      .title { font: 700 36px 'DejaVu Sans', sans-serif; fill: #ffffff; }
      .subtitle { font: 500 18px 'DejaVu Sans', sans-serif; fill: #dce8ed; }
      .section { font: 700 24px 'DejaVu Sans', sans-serif; fill: #1d2b31; }
      .label { font: 700 18px 'DejaVu Sans', sans-serif; fill: #1d2b31; }
      .body { font: 500 16px 'DejaVu Sans', sans-serif; fill: #32454d; }
      .mono { font: 500 15px 'DejaVu Sans Mono', monospace; fill: #24363d; }
      .mono-light { font: 500 15px 'DejaVu Sans Mono', monospace; fill: #f5fbff; }
      .small { font: 500 14px 'DejaVu Sans', sans-serif; fill: #4a5c63; }
      .card { fill: #ffffff; stroke: #b8c8c5; stroke-width: 2; rx: 20; }
      .soft { fill: #f8fbfa; stroke: #cddad7; stroke-width: 2; rx: 16; }
      .accent { fill: #d9ebe8; stroke: #7fa6a0; stroke-width: 2; rx: 16; }
      .accent2 { fill: #f0e6d6; stroke: #b88e58; stroke-width: 2; rx: 16; }
      .accent3 { fill: #e6edf3; stroke: #69859d; stroke-width: 2; rx: 16; }
      .line { stroke: #6a8580; stroke-width: 3; fill: none; }
      .dash { stroke: #95aaa5; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)"/>

  <rect x="40" y="36" width="1320" height="120" rx="28" fill="url(#hero)"/>
  <text x="78" y="86" class="title">redox_constantV Overview</text>
  <text x="78" y="120" class="subtitle">Constant-potential MD + RedoxMC + formulation screening + DFT interface</text>
  <text x="78" y="146" class="mono-light">Main docs: README.md | docs/methods/USER_MANUAL_CN.md | docs/methods/QUICK_REFERENCE.md</text>

  <text x="58" y="212" class="section">1. Repository Layout</text>
  <rect x="40" y="228" width="560" height="640" class="card"/>

  <rect x="68" y="258" width="504" height="134" class="accent"/>
  <text x="92" y="292" class="label">Configs and Core</text>
  <text x="92" y="324" class="mono">configs/md, redox, oxidation, pathways</text>
  <text x="92" y="350" class="mono">configs/formulations, dft_workflows</text>
  <text x="92" y="376" class="mono">core/  core MD, RedoxMC, analyzers</text>

  <rect x="68" y="414" width="504" height="134" class="accent2"/>
  <text x="92" y="448" class="label">Scripts and Structures</text>
  <text x="92" y="480" class="mono">scripts/cli   run_voltage_sweep.py</text>
  <text x="92" y="506" class="mono">scripts/dft   generate_redox_config_from_dft.py</text>
  <text x="92" y="532" class="mono">structures/pdb_bank and structures/systems</text>

  <rect x="68" y="570" width="504" height="134" class="accent3"/>
  <text x="92" y="604" class="label">Results and Documentation</text>
  <text x="92" y="636" class="mono">results/   sweeps, batch reports, debug runs</text>
  <text x="92" y="662" class="mono">docs/methods, provenance, reports</text>
  <text x="92" y="688" class="mono">tests/ and archive/legacy/</text>

  <rect x="68" y="726" width="504" height="112" class="soft"/>
  <text x="92" y="760" class="label">Recommended Entry Points</text>
  <text x="92" y="792" class="mono">README.md</text>
  <text x="210" y="792" class="small">project entry</text>
  <text x="92" y="818" class="mono">docs/methods/USER_MANUAL_CN.md</text>
  <text x="430" y="818" class="small">full manual</text>

  <text x="640" y="212" class="section">2. Main Workflows</text>
  <rect x="620" y="228" width="740" height="402" class="card"/>

  <rect x="654" y="266" width="672" height="88" class="soft"/>
  <text x="678" y="300" class="label">A. Constant-potential MD sweep</text>
  <text x="678" y="328" class="body">configs/md + structures/systems -> scripts/cli/run_voltage_sweep.py -> results/voltage_sweep_*</text>

  <path d="M990 356 L990 392" class="line"/>
  <polygon points="990,408 980,388 1000,388" fill="#6a8580"/>

  <rect x="654" y="414" width="320" height="168" class="accent"/>
  <text x="678" y="448" class="label">B. Formulation screening</text>
  <text x="678" y="478" class="body">configs/formulations</text>
  <text x="678" y="504" class="body">+ redox / oxidation / pathway configs</text>
  <text x="678" y="530" class="body">-> scripts/cli/batch_screen_formulations.py</text>
  <text x="678" y="556" class="body">-> batch ranking and reports</text>

  <rect x="1006" y="414" width="320" height="168" class="accent2"/>
  <text x="1030" y="448" class="label">C. DFT-backed parameter generation</text>
  <text x="1030" y="478" class="body">configs/dft_workflows</text>
  <text x="1030" y="504" class="body">+ structures/pdb_bank</text>
  <text x="1030" y="530" class="body">-> scripts/dft/generate_redox_config_from_dft.py</text>
  <text x="1030" y="556" class="body">-> redox config for screening</text>

  <path d="M974 498 L1006 498" class="dash"/>

  <text x="640" y="676" class="section">3. Common Commands</text>
  <rect x="620" y="692" width="740" height="176" class="card"/>

  <rect x="650" y="720" width="680" height="34" rx="10" fill="#203a43"/>
  <text x="668" y="743" class="mono-light">python tests/test_redox_framework.py</text>

  <rect x="650" y="768" width="680" height="34" rx="10" fill="#2f5d50"/>
  <text x="668" y="791" class="mono-light">bash run_examples.sh all</text>

  <rect x="650" y="816" width="680" height="34" rx="10" fill="#8a6234"/>
  <text x="668" y="839" class="mono-light">python scripts/cli/run_voltage_sweep.py --config configs/md/config_opls.json ...</text>
</svg>
